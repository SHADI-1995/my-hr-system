<!DOCTYPE html>
<html>
<head>
  <style>
    body { direction: rtl; padding: 20px; }

    h1 {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      letter-spacing: 2px;
    }
    p {
      font-size: 17px;
      line-height: 1.9;
      font-family: Georgia, serif;
    }
    .مميز {
      text-decoration: underline;
      font-weight: 600;
      color: #185FA5;
    }
  </style>
</head>
<body>
  <h1>تنسيق النصوص</h1>
  <p>هذه فقرة بخط وحجم مخصص.
  <span class="مميز">هذا نص مميز</span>
  داخل الجملة.</p>
</body>
</html>
